name: Daily Story Generation

on:
  schedule:
    - cron: '0 17 * * *'   # 17:00 UTC = 00:00 Thailand time (UTC+7)
  workflow_dispatch:         # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate daily stories
        run: node scripts/generate-story.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Commit and push new stories
        run: |
          git config user.name "Nithan Bot"
          git config user.email "bot@nithan.co"
          git add src/content/stories/ src/content/stories-en/ public/images/
          git diff --staged --quiet || git commit -m "📖 Daily stories — $(date +'%Y-%m-%d')"
          git push
